<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intelligence History Tool</title>
<style>
:root {
  --navy: #002d72;
  --navy-dark: #001a44;
  --gold: #c39536;
  --bg: #fafafa;
  --card: #ffffff;
  --text: #1a1a1a;
  --text-muted: #666;
  --border: #e0e0e0;
  --green: #0d7a3f;
  --red: #c0392b;
}
 
* { margin: 0; padding: 0; box-sizing: border-box; }
 
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}
 
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px;
}
 
header {
  background: var(--navy);
  color: white;
  padding: 20px 24px;
  margin: -24px -24px 24px -24px;
  border-bottom: 3px solid var(--gold);
  display: flex;
  align-items: center;
  gap: 24px;
}
 
.logo {
  flex-shrink: 0;
}
 
.logo svg {
  width: 120px;
  height: auto;
}
 
.header-content {
  flex: 1;
}
 
header h1 {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.3px;
  margin-bottom: 4px;
}
 
header .meta {
  font-size: 13px;
  opacity: 0.85;
}
 
.search-panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  margin-bottom: 24px;
}
 
.search-header {
  font-size: 18px;
  font-weight: 600;
  color: var(--navy);
  margin-bottom: 16px;
}
 
.search-controls {
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: 12px;
  align-items: end;
}
 
.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
 
label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
 
select {
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 14px;
  color: var(--text);
  background: white;
  cursor: pointer;
}
 
select:focus {
  outline: none;
  border-color: var(--navy);
}
 
.search-btn {
  padding: 10px 24px;
  background: var(--navy);
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
 
.search-btn:hover {
  background: var(--navy-dark);
}
 
.results-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--navy);
}
 
.results-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--navy);
}
 
.results-count {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 500;
}
 
.timeline {
  position: relative;
  padding-left: 48px;
}
 
.timeline::before {
  content: '';
  position: absolute;
  left: 16px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--border);
}
 
.timeline-item {
  position: relative;
  margin-bottom: 32px;
  padding: 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
}
 
.timeline-item::before {
  content: '';
  position: absolute;
  left: -37px;
  top: 24px;
  width: 10px;
  height: 10px;
  background: var(--gold);
  border-radius: 50%;
  border: 2px solid white;
  box-shadow: 0 0 0 2px var(--gold);
}
 
.item-date {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
 
.item-state {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}
 
.state-structural-rich {
  background: #e8f5e9;
  color: var(--green);
}
 
.state-structural-cheap {
  background: #fef2f2;
  color: var(--red);
}
 
.state-conflict {
  background: #fff3cd;
  color: #856404;
}
 
.state-tactical {
  background: #e3f2fd;
  color: #0d47a1;
}
 
.item-metrics {
  display: flex;
  gap: 20px;
  margin-bottom: 10px;
  font-family: "SF Mono", Menlo, Consolas, monospace;
  font-size: 13px;
}
 
.metric {
  display: flex;
  align-items: baseline;
  gap: 6px;
}
 
.metric-label {
  color: var(--text-muted);
  font-size: 11px;
  text-transform: uppercase;
}
 
.metric-value {
  font-weight: 600;
  color: var(--navy);
}
 
.item-commentary {
  font-size: 13px;
  color: var(--text);
  line-height: 1.6;
  font-style: italic;
}
 
.placeholder {
  text-align: center;
  padding: 64px 24px;
  color: var(--text-muted);
  font-size: 14px;
}
 
.placeholder-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.3;
}
 
footer {
  margin-top: 48px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <svg width="120" height="48" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
        <text x="100" y="52" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="48" font-weight="400" letter-spacing="10" fill="white">YILD</text>
        <rect x="28" y="59" width="144" height="0.8" fill="white"/>
        <text x="100" y="74" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="400" letter-spacing="8" fill="white">INC.</text>
      </svg>
    </div>
    <div class="header-content">
      <h1>Intelligence History Tool</h1>
      <div class="meta">Query past market intelligence, z-scores, and analysis for any trade</div>
    </div>
  </header>
 
  <div class="search-panel">
    <div class="search-header">Search Parameters</div>
    <div class="search-controls">
      <div class="form-group">
        <label for="structure">Structure</label>
        <select id="structure">
          <option value="">Select a structure...</option>
          <option value="UST_5s10s">UST 5s10s</option>
          <option value="UST_5s10s30s_fly">UST 5s10s30s fly</option>
          <option value="UST_2s5s10s_fly">UST 2s5s10s fly</option>
          <option value="TIPS_5s7s">TIPS 5s7s</option>
          <option value="CGB_2s10s30s_fly">CGB 2s10s30s fly</option>
          <option value="BAML_AAA_BBB_SPREAD">BAML AAA BBB SPREAD</option>
          <option value="OBFR_SOFR_BASIS">OBFR SOFR BASIS</option>
        </select>
      </div>
 
      <div class="form-group">
        <label for="dateRange">Date Range</label>
        <select id="dateRange">
          <option value="7d">Last 7 days</option>
          <option value="30d">Last 30 days</option>
          <option value="90d" selected>Last 90 days</option>
          <option value="1y">Last year</option>
          <option value="all">All history</option>
        </select>
      </div>
 
      <button class="search-btn" onclick="runSearch()">Search History</button>
    </div>
  </div>
 
  <div id="results" style="display: none;">
    <div class="results-header">
      <div class="results-title"></div>
      <div class="results-count"></div>
    </div>
 
    <div class="timeline" id="timeline">
      <!-- Populated by JavaScript -->
    </div>
  </div>
 
  <div id="placeholder" class="placeholder">
    <div class="placeholder-icon">🔍</div>
    <div>Select a structure and date range, then click Search History</div>
  </div>
 
  <footer>
    YILD INC. • Platform intelligence framework • Institutional use only
  </footer>
</div>

function runSearch() {
  const structure = document.getElementById('structure').value;
  const dateRange = document.getElementById('dateRange').value;
  const resultsDiv = document.getElementById('results');
  const placeholderDiv = document.getElementById('placeholder');
  
  if (!structure) {
    alert('Please select a structure');
    return;
  }
  
  const data = structureData[structure];
  if (!data) {
    alert('No data available for this structure');
    return;
  }
  
  // Filter by date range
  const now = new Date('2026-05-03');
  let filteredData = data;
  
  if (dateRange === '7d') {
    const cutoff = new Date(now);
    cutoff.setDate(cutoff.getDate() - 7);
    filteredData = data.filter(d => new Date(d.date) >= cutoff);
  } else if (dateRange === '30d') {
    const cutoff = new Date(now);
    cutoff.setDate(cutoff.getDate() - 30);
    filteredData = data.filter(d => new Date(d.date) >= cutoff);
  } else if (dateRange === '90d') {
    const cutoff = new Date(now);
    cutoff.setDate(cutoff.getDate() - 90);
    filteredData = data.filter(d => new Date(d.date) >= cutoff);
  } else if (dateRange === '1y') {
    const cutoff = new Date(now);
    cutoff.setFullYear(cutoff.getFullYear() - 1);
    filteredData = data.filter(d => new Date(d.date) >= cutoff);
  }
  
  // Update header
  const structureName = document.getElementById('structure').selectedOptions[0].text;
  document.querySelector('.results-title').textContent = `Intelligence History: ${structureName}`;
  document.querySelector('.results-count').textContent = `${filteredData.length} events in selected range`;
  
  // Build timeline
  const timeline = document.getElementById('timeline');
  timeline.innerHTML = filteredData.map(item => {
    const stateClass = item.state.toLowerCase().replace(/ /g, '-').replace(/historically-/, 'structural-').replace(/pending-outcome-analysis/, 'conflict').replace(/tactical-fade-setup/, 'tactical');
    const zSign = item.z >= 0 ? '+' : '';
    return `
      <div class="timeline-item">
        <div class="item-date">${item.date}</div>
        <span class="item-state state-${stateClass}">${item.state}</span>
        <div class="item-metrics">
          <div class="metric">
            <span class="metric-label">z-score</span>
            <span class="metric-value">${zSign}${item.z.toFixed(2)}σ</span>
          </div>
          <div class="metric">
            <span class="metric-label">half-life</span>
            <span class="metric-value">${item.hl.toFixed(1)}d</span>
          </div>
          <div class="metric">
            <span class="metric-label">reason</span>
            <span class="metric-value">${item.reason}</span>
          </div>
        </div>
        ${item.commentary ? `<div class="item-commentary">${item.commentary}</div>` : ''}
      </div>
    `;
  }).join('');
  
  // Show results, hide placeholder
  resultsDiv.style.display = 'block';
  placeholderDiv.style.display = 'none';
}
</script>

</html>
